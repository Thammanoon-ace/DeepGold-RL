# Pyrefly type-checker configuration.
#
# Point Pyrefly at the project virtualenv (Python 3.11) instead of the system
# interpreter, so third-party imports (gymnasium, torch, stable-baselines3,
# pandas, ...) resolve. Without this, Pyrefly queries the system Python 3.13
# site-packages — where these packages are NOT installed — and reports spurious
# "Cannot find module" errors even though the code runs fine in the venv.
python-interpreter = ".venv/Scripts/python.exe"
python-version = "3.11.9"

# Treat the project root as a first-party import root so config/, env/, utils/,
# training/, backtest/, validation/, policies/, optimization/, live_trading/
# resolve as local packages.
search-path = ["."]

# Don't analyse the virtualenv or caches.
project-excludes = ["**/.venv/**", "**/__pycache__/**", "**/.dukascopy_cache/**"]

# Silence error classes that are pure false positives for this numpy/pandas + RL
# codebase (every current instance was reviewed and confirmed harmless):
#   * unsupported-operation / missing-attribute — runtime-guarded Optionals the
#     checker can't narrow (e.g. self.pipeline.train_df after a None check) and
#     the untyped MetaTrader5 module (no type stubs).
#   * bad-argument-type / bad-assignment — passing np.ndarray where a
#     Sequence[float] is annotated (works at runtime); these stay catchable in
#     practice via tests + the equivalence/smoke checks.
# Re-enable any of these for stricter checking once type hints are tightened.
[errors]
unsupported-operation = false
missing-attribute = false
bad-argument-type = false
bad-assignment = false
# bad-return: a few methods annotated `-> PPO` can return `PPO | None` per the
#   checker (they always assign a model first); cosmetic.
# no-matching-overload: pandas Resampler.aggregate(dict) — valid at runtime,
#   pandas stubs are incomplete.
# bad-index: indexing dicts/modules the checker can't fully resolve.
bad-return = false
no-matching-overload = false
bad-index = false
